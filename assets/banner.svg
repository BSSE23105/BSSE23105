<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muhammad Abdul Qadir — Full-Stack Developer, AI/ML, DevOps and Cloud">
  <title>Muhammad Abdul Qadir — Full-Stack · AI/ML · DevOps &amp; Cloud</title>
  <defs>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="55%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7dcfff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2335" stroke-width="1"/>
    </pattern>
    <clipPath id="card">
      <rect x="0" y="0" width="1280" height="320" rx="18"/>
    </clipPath>
  </defs>

  <style>
    text {
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'SFMono-Regular', Consolas, Menlo, monospace;
    }
    .reveal { animation: reveal 0.55s ease-out both; }
    .d1 { animation-delay: 0.15s; }
    .d2 { animation-delay: 0.50s; }
    .d3 { animation-delay: 0.90s; }
    .d4 { animation-delay: 1.25s; }
    .d5 { animation-delay: 1.60s; }
    @keyframes reveal { from { opacity: 0; } to { opacity: 1; } }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .node-pulse { animation: nodePulse 3.2s ease-in-out infinite; }
    .np2 { animation-delay: 1.1s; }
    .np3 { animation-delay: 2.2s; }
    @keyframes nodePulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    .check { animation: reveal 0.4s ease-out 2.2s both; }
    @media (prefers-reduced-motion: reduce) {
      .reveal, .check, .node-pulse, .cursor { animation: none; }
      .pulse-dot { display: none; }
    }
  </style>

  <g clip-path="url(#card)">
    <!-- terminal body -->
    <rect x="0" y="0" width="1280" height="320" fill="#1a1b26"/>
    <rect x="0" y="44" width="1280" height="276" fill="url(#grid)" opacity="0.5"/>
    <circle cx="1150" cy="40" r="300" fill="url(#glowPurple)"/>
    <circle cx="220" cy="300" r="260" fill="url(#glowCyan)"/>

    <!-- title bar -->
    <rect x="0" y="0" width="1280" height="44" fill="#16161e"/>
    <line x1="0" y1="44" x2="1280" y2="44" stroke="#2a2e42" stroke-width="1"/>
    <circle cx="30" cy="22" r="6.5" fill="#f7768e" opacity="0.9"/>
    <circle cx="54" cy="22" r="6.5" fill="#e0af68" opacity="0.9"/>
    <circle cx="78" cy="22" r="6.5" fill="#9ece6a" opacity="0.9"/>
    <text x="104" y="27" font-size="13" fill="#565f89">abdulqadir@itu : ~/ship-it</text>
    <text x="1232" y="27" font-size="13" fill="#3b4261" text-anchor="end">zsh</text>

    <!-- session -->
    <text x="48" y="96" font-size="17" class="reveal d1">
      <tspan fill="#9ece6a">&#10148;</tspan><tspan fill="#7aa2f7" dx="10">~</tspan><tspan fill="#c0caf5" dx="12">whoami</tspan>
    </text>

    <text x="46" y="152" font-size="52" font-weight="700" letter-spacing="-1.5" fill="url(#nameGrad)" class="reveal d2">Muhammad Abdul Qadir</text>

    <text x="48" y="204" font-size="17" class="reveal d3">
      <tspan fill="#9ece6a">&#10148;</tspan><tspan fill="#7aa2f7" dx="10">~</tspan><tspan fill="#c0caf5" dx="12">./deploy</tspan><tspan fill="#bb9af7" dx="10">--stack</tspan>
    </text>

    <text x="48" y="240" font-size="19" class="reveal d4">
      <tspan fill="#565f89">&#8594;</tspan><tspan fill="#7dcfff" dx="12" font-weight="600">full-stack</tspan><tspan fill="#565f89" dx="10">&#183;</tspan><tspan fill="#bb9af7" dx="10" font-weight="600">ai/ml</tspan><tspan fill="#565f89" dx="10">&#183;</tspan><tspan fill="#7aa2f7" dx="10" font-weight="600">devops &amp; cloud</tspan>
    </text>
    <rect x="474" y="224" width="11" height="21" fill="#c0caf5" class="cursor reveal d4"/>

    <!-- node constellation: neural net / microservices topology -->
    <g class="reveal d5" opacity="0.85">
      <g stroke="#2f334d" stroke-width="1.2">
        <line x1="940" y1="110" x2="1030" y2="80"/>
        <line x1="1030" y1="80" x2="1120" y2="120"/>
        <line x1="1120" y1="120" x2="1200" y2="90"/>
        <line x1="940" y1="110" x2="980" y2="180"/>
        <line x1="980" y1="180" x2="1080" y2="190"/>
        <line x1="1080" y1="190" x2="1170" y2="170"/>
        <line x1="1120" y1="120" x2="1080" y2="190"/>
        <line x1="1170" y1="170" x2="1210" y2="230"/>
        <line x1="1080" y1="190" x2="1040" y2="240"/>
        <line x1="1200" y1="90" x2="1170" y2="170"/>
      </g>
      <circle cx="940" cy="110" r="3.5" fill="#414868"/>
      <circle cx="1120" cy="120" r="3.5" fill="#414868"/>
      <circle cx="1200" cy="90" r="3.5" fill="#414868"/>
      <circle cx="980" cy="180" r="3.5" fill="#414868"/>
      <circle cx="1170" cy="170" r="3.5" fill="#414868"/>
      <circle cx="1040" cy="240" r="3.5" fill="#414868"/>
      <circle cx="1030" cy="80" r="4.5" fill="#7dcfff" class="node-pulse"/>
      <circle cx="1080" cy="190" r="5" fill="#bb9af7" class="node-pulse np2"/>
      <circle cx="1210" cy="230" r="4" fill="#7aa2f7" class="node-pulse np3"/>
      <g class="pulse-dot">
        <circle r="2.2" fill="#7dcfff">
          <animateMotion path="M 940 110 L 1030 80 L 1120 120 L 1200 90" dur="6s" repeatCount="indefinite" begin="2s"/>
        </circle>
        <circle r="2.2" fill="#bb9af7">
          <animateMotion path="M 980 180 L 1080 190 L 1170 170 L 1210 230" dur="7s" repeatCount="indefinite" begin="3.2s"/>
        </circle>
      </g>
    </g>

    <!-- ci/cd pipeline rail -->
    <g class="reveal d5">
      <line x1="48" y1="282" x2="1232" y2="282" stroke="#2f334d" stroke-width="1.5"/>
      <circle cx="68" cy="282" r="5" fill="#1a1b26" stroke="#7dcfff" stroke-width="2"/>
      <text x="82" y="287" font-size="13" fill="#565f89">commit</text>
      <circle cx="400" cy="282" r="5" fill="#1a1b26" stroke="#7aa2f7" stroke-width="2"/>
      <text x="414" y="287" font-size="13" fill="#565f89">build</text>
      <circle cx="732" cy="282" r="5" fill="#1a1b26" stroke="#bb9af7" stroke-width="2"/>
      <text x="746" y="287" font-size="13" fill="#565f89">test</text>
      <circle cx="1064" cy="282" r="5" fill="#1a1b26" stroke="#9ece6a" stroke-width="2"/>
      <text x="1078" y="287" font-size="13" fill="#9ece6a">deploy<tspan class="check" fill="#9ece6a" dx="8">&#10003;</tspan></text>
      <g class="pulse-dot">
        <circle r="6" fill="#7dcfff" opacity="0.25">
          <animateMotion path="M 48 282 L 1232 282" dur="4.5s" repeatCount="indefinite" begin="1.8s"/>
        </circle>
        <circle r="3" fill="#7dcfff">
          <animateMotion path="M 48 282 L 1232 282" dur="4.5s" repeatCount="indefinite" begin="1.8s"/>
        </circle>
      </g>
    </g>

    <!-- card border -->
    <rect x="0.5" y="0.5" width="1279" height="319" rx="17.5" fill="none" stroke="#2a2e42" stroke-width="1"/>
  </g>
</svg>
